name = "prettier"
version = "3.8.1"
abi = "riscv64gc-linux-musl"

# Prettier — a multi-file catalog app that runs ON node (install the `node` recipe
# too). Its node_modules tree installs under /usr/local/lib and a
# /usr/local/bin/prettier wrapper execs it. Conformed via `prettier --version`.
multifile = true
runner = "node"

[entrypoint]
argv = ["prettier"]
env = { }

[maintainer]
name = "userland.run"
contact = "https://github.com/userland-run/catalog"

[status]
features = ["catalog.recipe.prettier"]

# publish (ICU node landed; conforms)
