name = "_stdin-fixture-test"
version = "1.0.0"
abi = "riscv64gc-linux-musl"

# Internal conformance smoke for the harness's scripted stdin (M1). Filter /
# interactive tools read stdin, which is otherwise unavailable in the headless
# harness; run.json "stdin" seeds it. This recipe pipes a fixed string through the
# busybox guest (`cat`) so read(0) returns it (then EOF) and the golden is stable.
# No new app is shipped — it reuses the busybox ELF (see build.sh).

[source]
prebuilt = true

[entrypoint]
argv = ["busybox", "head", "-n", "100"]
path = "/bin/busybox"
env = { }

[maintainer]
name = "userland.run"
contact = "https://github.com/userland-run/catalog"

[status]
features = ["catalog.test.stdin-fixture"]
