#
# Bootstrap new recipes' conformance goldens in CI. A scaffolded recipe ships
# test/run.json with "stdoutSha256": "TBD"; the cross-compile toolchain lives in
# CI, so this builds each TBD recipe IN PARALLEL (one runner per recipe), captures
# the golden against the released nano runtime (tools/capture-golden.mjs), and
# commits the run.jsons back in one collected commit. publish.yml then ENFORCES
# them. Adding tools is: scaffold (new-recipe.mjs) → push → CI captures + publishes.
name: capture-goldens

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["recipes/**/build.sh", "recipes/**/recipe.toml", "recipes/**/test/run.json"]

permissions:
  contents: write   # commit the captured goldens back

env:
  NANO_RELEASE: https://github.com/userland-run/nano/releases/download/v0.1.0

jobs:
  # Emit the JSON array of recipes whose golden is still TBD.
  detect:
    runs-on: ubuntu-latest
    outputs:
      recipes: ${{ steps.d.outputs.recipes }}
    steps:
      - uses: actions/checkout@v4
      - id: d
        run: |
          ready=""
          for dir in recipes/*/; do
            name="$(basename "$dir")"; rj="$dir/test/run.json"
            [ -f "$rj" ] || continue
            grep -q '"stdoutSha256": *"TBD"' "$rj" || continue
            ready="$ready$name"$'\n'
          done
          arr=$(printf "%s" "$ready" | sed '/^$/d' | jq -R . | jq -cs .)
          echo "recipes=${arr:-[]}" >> "$GITHUB_OUTPUT"
          echo "TBD recipes: ${arr:-[]}"

  # One runner per TBD recipe: build + capture, upload the captured run.json.
  capture:
    needs: detect
    if: needs.detect.outputs.recipes != '[]' && needs.detect.outputs.recipes != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # one recipe failing must not cancel the others
      matrix:
        recipe: ${{ fromJSON(needs.detect.outputs.recipes) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: riscv64gc-unknown-linux-musl }
      - name: Cache zig
        uses: actions/cache@v4
        with: { path: ~/.zig-0.13.0, key: zig-0.13.0-linux-x86_64 }
      - name: Setup zig (cached + retried)
        run: |
          ZDIR="$HOME/.zig-0.13.0"
          if [ ! -x "$ZDIR/zig" ]; then
            curl -fL --retry 6 --retry-all-errors --retry-delay 5 \
              "https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz" -o /tmp/zig.tar.xz
            mkdir -p "$ZDIR" && tar -xJf /tmp/zig.tar.xz -C "$ZDIR" --strip-components=1
          fi
          echo "$ZDIR" >> "$GITHUB_PATH"; "$ZDIR/zig" version
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Fetch nano runtime (+ node for runner=node recipes)
        run: |
          curl -fsSL "$NANO_RELEASE/nano.min.wasm" -o nano.min.wasm
          curl -fsSL "$NANO_RELEASE/node"          -o node-runtime || true

      - name: Build + capture ${{ matrix.recipe }}
        id: cap
        continue-on-error: true   # a build/capture failure leaves the golden TBD (loud, not fatal)
        run: |
          r="recipes/${{ matrix.recipe }}"
          bash "$r/build.sh"
          if grep -q 'runner *= *"node"' "$r/recipe.toml"; then
            NANOVM_WASM=nano.min.wasm node tools/capture-golden.mjs "${{ matrix.recipe }}" --bin node-runtime --tree "$r/out"
          else
            NANOVM_WASM=nano.min.wasm node tools/capture-golden.mjs "${{ matrix.recipe }}"
          fi

      - name: Upload captured golden
        if: steps.cap.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: golden-${{ matrix.recipe }}
          path: recipes/${{ matrix.recipe }}/test/run.json
          if-no-files-found: ignore

  # Collect every captured run.json and commit them once (no concurrent-push race).
  # A PAT (CATALOG_PUSH_TOKEN) makes the commit trigger publish.yml; with the
  # default GITHUB_TOKEN it lands but publish must be re-triggered manually.
  commit:
    needs: capture
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CATALOG_PUSH_TOKEN || github.token }}
      - uses: actions/download-artifact@v4
        with: { path: /tmp/goldens, pattern: golden-* }
        continue-on-error: true   # no captures → nothing to download
      - name: Apply + commit captured goldens
        run: |
          shopt -s nullglob
          applied=0
          for d in /tmp/goldens/golden-*/; do
            recipe="$(basename "$d" | sed 's/^golden-//')"
            [ -f "$d/run.json" ] || continue
            cp "$d/run.json" "recipes/$recipe/test/run.json" && applied=1
          done
          if [ "$applied" != 1 ]; then echo "no goldens captured this run"; exit 0; fi
          git config user.name  "nano-catalog-bot"
          git config user.email "bot@userland.run"
          git add recipes/*/test/run.json
          if git diff --cached --quiet; then
            echo "no golden changes to commit"
          else
            git commit -m "ci: capture conformance goldens"
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main && git push && break || sleep $((i*5))
            done
          fi
